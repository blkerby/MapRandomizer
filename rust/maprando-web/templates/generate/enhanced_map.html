<div class="modal" id="enhancedMapModal" tabindex="-1" data-parent-modal="qualityOfLifeModal">
    <div class="modal-dialog modal-lg modal-fullscreen-sm-down modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5">Enhanced map</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body px-4 py-2">
                <div class="card m-2">
                    <div class="card-header">Doors</div>
                    <div class="card-body">
                        <div class="form-group row my-2">
                            <label for="enhancedMapGrayDoors" class="col-md-7 col-lg-5 col-form-label">Gray
                                doors</label>
                            <div id="enhancedMapGrayDoors" class="col-sm-5 col-lg-4 btn-group">
                                <input type="radio" class="btn-check" name="enhanced_map_gray_doors"
                                    id="enhancedMapGrayDoorsHidden" value="Hidden"
                                    onchange="enhancedMapSettingChanged()">
                                <label class="btn btn-outline-primary" for="enhancedMapGrayDoorsHidden">Hidden</label>
                                <input type="radio" class="btn-check" name="enhanced_map_gray_doors"
                                    id="enhancedMapGrayDoorsVisible" value="Visible"
                                    onchange="enhancedMapSettingChanged()">
                                <label class="btn btn-outline-primary" for="enhancedMapGrayDoorsVisible">Visible</label>
                            </div>
                        </div>
                        <div class="form-group row my-2">
                            <label for="enhancedMapAmmoDoors" class="col-md-7 col-lg-5 col-form-label">Ammo
                                doors</label>
                            <div id="enhancedMapAmmoDoors" class="col-sm-5 col-lg-4 btn-group">
                                <input type="radio" class="btn-check" name="enhanced_map_ammo_doors"
                                    id="enhancedMapAmmoDoorsHidden" value="Hidden"
                                    onchange="enhancedMapSettingChanged()">
                                <label class="btn btn-outline-primary" for="enhancedMapAmmoDoorsHidden">Hidden</label>
                                <input type="radio" class="btn-check" name="enhanced_map_ammo_doors"
                                    id="enhancedMapAmmoDoorsVisible" value="Visible"
                                    onchange="enhancedMapSettingChanged()">
                                <label class="btn btn-outline-primary"
                                    for="enhancedMapAmmoDoorsVisible">Visible</label>
                            </div>
                        </div>
                        <div class="form-group row my-2">
                            <label for="enhancedMapBeamDoors" class="col-md-7 col-lg-5 col-form-label">Beam
                                doors</label>
                            <div id="enhancedMapBeamDoors" class="col-sm-5 col-lg-4 btn-group">
                                <input type="radio" class="btn-check" name="enhanced_map_beam_doors"
                                    id="enhancedMapBeamDoorsHidden" value="Hidden"
                                    onchange="enhancedMapSettingChanged()">
                                <label class="btn btn-outline-primary" for="enhancedMapBeamDoorsHidden">Hidden</label>
                                <input type="radio" class="btn-check" name="enhanced_map_beam_doors"
                                    id="enhancedMapBeamDoorsVisible" value="Visible"
                                    onchange="enhancedMapSettingChanged()">
                                <label class="btn btn-outline-primary" for="enhancedMapBeamDoorsVisible">Visible</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12">
                        <div class="card m-2">
                            <div class="card-header">Environment</div>
                            <div class="card-body">
                                <div class="form-group row my-2">
                                    <label for="enhancedMapHeat" class="col-md-7 col-lg-5 col-form-label">Heat</label>
                                    <div id="enhancedMapHeat" class="col-sm-5 col-lg-4 btn-group">
                                        <input type="radio" class="btn-check" name="enhanced_map_heat"
                                            id="enhancedMapHeatHidden" value="Hidden"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapHeatHidden">Hidden</label>
                                        <input type="radio" class="btn-check" name="enhanced_map_heat"
                                            id="enhancedMapHeatVisible" value="Visible"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapHeatVisible">Visible</label>
                                    </div>
                                </div>
                                <div class="form-group row my-2">
                                    <label for="enhancedMapWater" class="col-md-7 col-lg-5 col-form-label">Water</label>
                                    <div id="enhancedMapWater" class="col-sm-5 col-lg-4 btn-group">
                                        <input type="radio" class="btn-check" name="enhanced_map_water"
                                            id="enhancedMapWaterHidden" value="Hidden"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapWaterHidden">Hidden</label>
                                        <input type="radio" class="btn-check" name="enhanced_map_water"
                                            id="enhancedMapWaterVisible" value="Visible"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapWaterVisible">Visible</label>
                                    </div>
                                </div>
                                <div class="form-group row my-2">
                                    <label for="enhancedMapLava" class="col-md-7 col-lg-5 col-form-label">Lava</label>
                                    <div id="enhancedMapLava" class="col-sm-5 col-lg-4 btn-group">
                                        <input type="radio" class="btn-check" name="enhanced_map_lava"
                                            id="enhancedMapLavaHidden" value="Hidden"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapLavaHidden">Hidden</label>
                                        <input type="radio" class="btn-check" name="enhanced_map_lava"
                                            id="enhancedMapLavaVisible" value="Visible"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapLavaVisible">Visible</label>
                                    </div>
                                </div>
                                <div class="form-group row my-2">
                                    <label for="enhancedMapAcid" class="col-md-7 col-lg-5 col-form-label">Acid</label>
                                    <div id="enhancedMapAcid" class="col-sm-5 col-lg-4 btn-group">
                                        <input type="radio" class="btn-check" name="enhanced_map_acid"
                                            id="enhancedMapAcidHidden" value="Hidden"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapAcidHidden">Hidden</label>
                                        <input type="radio" class="btn-check" name="enhanced_map_acid"
                                            id="enhancedMapAcidVisible" value="Visible"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapAcidVisible">Visible</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card m-2">
                            <div class="card-header">Other</div>
                            <div class="card-body">
                                <div class="form-group row my-2">
                                    <label for="enhancedMapWalls" class="col-md-7 col-lg-5 col-form-label">Walls and
                                        passages</label>
                                    <div id="enhancedMapWalls" class="col-sm-2 btn-group">
                                        <input type="radio" class="btn-check" name="enhanced_map_walls"
                                            id="enhancedMapWallsVanilla" value="Vanilla"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapWallsVanilla">Vanilla</label>
                                        <input type="radio" class="btn-check" name="enhanced_map_walls"
                                            id="enhancedMapWallsWhite" value="White" checked
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary" for="enhancedMapWallsWhite">White</label>
                                        <input type="radio" class="btn-check" name="enhanced_map_walls"
                                            id="enhancedMapWallsBlack" value="Black"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary" for="enhancedMapWallsBlack">Black</label>
                                    </div>
                                </div>

                                <div class="form-group row my-2">
                                    <label for="enhancedMapObjectives" class="col-md-7 col-lg-5 col-form-label">Objectives</label>
                                    <div id="enhancedMapObjectives" class="col-sm-2 btn-group">
                                        <input type="radio" class="btn-check" name="enhanced_map_objectives"
                                            id="enhancedMapObjectivesVanilla" value="Vanilla" checked
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapObjectivesVanilla">Vanilla</label>
                                        <input type="radio" class="btn-check" name="enhanced_map_objectives"
                                            id="enhancedMapObjectivesIcon" value="Icon"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary" for="enhancedMapObjectivesIcon">Icon</label>
                                    </div>
                                </div>

                                <div class="form-group row my-2">
                                    <label for="enhancedMapStation" class="col-md-7 col-lg-5 col-form-label">Map
                                        Stations</label>
                                    <div id="enhancedMapStation" class="col-sm-2 btn-group">
                                        <input type="radio" class="btn-check" name="enhanced_map_station"
                                            id="enhancedMapStationVanilla" value="Vanilla" checked
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapStationVanilla">Vanilla</label>
                                        <input type="radio" class="btn-check" name="enhanced_map_station"
                                            id="enhancedMapStationIcon" value="Icon"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary" for="enhancedMapStationIcon">Icon</label>
                                    </div>
                                </div>

                                <div class="form-group row my-2">
                                    <label for="enhancedMapRefill" class="col-md-7 col-lg-5 col-form-label">Refill
                                        Stations</label>
                                    <div id="enhancedMapRefill" class="col-sm-2 btn-group">
                                        <input type="radio" class="btn-check" name="enhanced_map_refill"
                                            id="enhancedMapRefillVanilla" value="Vanilla" checked
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary"
                                            for="enhancedMapRefillVanilla">Vanilla</label>
                                        <input type="radio" class="btn-check" name="enhanced_map_refill"
                                            id="enhancedMapRefillIcon" value="Icon"
                                            onchange="enhancedMapSettingChanged()">
                                        <label class="btn btn-outline-primary" for="enhancedMapRefillIcon">Icon</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary ms-auto" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
