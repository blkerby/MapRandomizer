<div class="modal" id="fastDecompressionModal" tabindex="-1" data-parent-modal="qualityOfLifeModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5">Fast decompression</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>When enabled, vanilla game code that loads the next room data during the door transition is modified for increased loading speed</p>
        <p>Disabling this option will use the original code and result in a longer room load time during door transitions.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
