<div class="modal" id="ammoRefillAllModal" tabindex="-1" data-parent-modal="qualityOfLifeModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5">Ammo stations refill all ammo types</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>This option changes the ammo refill station behaviour:
        <ul>
            <li><p><strong>No</strong>: Ammo stations refill only Missiles (as in the vanilla game).</p>
            <li><p><strong>Yes</strong>: Ammo stations refill Missiles, Supers, and Power Bombs.</p>
        </ul>
        This setting is accounted for in logic.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
